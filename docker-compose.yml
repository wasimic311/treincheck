services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: treincheck
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: treincheck
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  worker:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
volumes:
  pgdata:
